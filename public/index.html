<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Quiz PM</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body class="player">
  <div id="screen-join" class="screen">
    <h1>🎯 Quiz</h1>
    <form id="join-form">
      <input type="text" id="name" placeholder="Ton pseudo" maxlength="20" autocomplete="off" required>
      <button type="submit">Rejoindre</button>
    </form>
    <div id="join-error" class="error"></div>
  </div>

  <div id="screen-lobby" class="screen hidden">
    <h2>👋 <span id="player-name"></span></h2>
    <p class="muted">En attente du démarrage…</p>
  </div>

  <div id="screen-question" class="screen hidden">
    <p class="muted" id="q-progress"></p>
    <h2 id="q-text"></h2>
    <div id="q-options" class="options"></div>
    <div id="q-distribution" class="distribution hidden">
      <p class="muted" id="dist-hint">⏳ En attente des autres votes…</p>
      <div id="dist-bars"></div>
    </div>
  </div>

  <div id="screen-reveal" class="screen hidden">
    <h2 id="reveal-result"></h2>
    <div id="reveal-bars" class="distribution"></div>
  </div>

  <div id="screen-end" class="screen hidden">
    <h2>🏁 Résultats</h2>
    <div class="score-card">
      <p class="score-label">Score moyen de la salle</p>
      <p class="score-value" id="avg-score">—</p>
    </div>
    <div class="comparisons">
      <div class="comp-card">
        <p class="comp-label">🏆 PMs Google &amp; OpenAI</p>
        <p class="comp-value comp-top">100%</p>
      </div>
      <div class="comp-card">
        <p class="comp-label">😅 Influenceurs LinkedIn</p>
        <p class="comp-value comp-bottom">2%</p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/player.js"></script>
</body>
</html>
